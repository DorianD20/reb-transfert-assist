<!DOCTYPE html>
<html lang="fr">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2933;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .onglet {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 10px;
      background: #e9eef2;
      border-radius: 8px;
      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet:hover {
      background: #d7e3ea;
    }

    .onglet.actif {
      background: #123b57;
      color: white;
    }

    main {
      max-width: 1200px;
      min-height: 650px;
      margin: 0 auto;
      padding: 40px 25px 140px;
      background: white;
    }

    h1 {
      margin: 0 0 35px;
      color: #123b57;
      font-size: 34px;
      text-align: center;
    }

    .contenu {
      max-width: 900px;
      margin: 0 auto;
      padding: 25px;
      border: 2px solid #d9e2e8;
      border-radius: 16px;
      background: #f4f7f8;
      text-align: center;
    }

    .contenu p {
      margin: 0;
      color: #52606d;
      font-size: 17px;
      line-height: 1.6;
    }

    .boutons-navigation {
      position: fixed;
      left: 28px;
      bottom: 28px;
      z-index: 2000;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .bouton-rond {
      width: 82px;
      height: 82px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      background:
        linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.55) 0%,
          rgba(255, 255, 255, 0.08) 38%,
          transparent 39%
        ),
        linear-gradient(145deg, #2389dc, #07559c);

      border: 3px solid #164d87;

      box-shadow:
        0 5px 12px rgba(0, 0, 0, 0.25),
        inset 0 1px 3px rgba(255, 255, 255, 0.65);

      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .bouton-rond svg {
      width: 35px;
      height: 35px;
      fill: none;
      stroke: white;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bouton-rond span {
      margin-top: 2px;
      font-size: 12px;
      font-weight: bold;
    }

    @media (max-width: 950px) {
      nav {
        grid-template-columns: repeat(2, 1fr);
      }

      main {
        padding: 30px 15px 140px;
      }

      h1 {
        font-size: 28px;
      }
    }
