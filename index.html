<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REB Transfert Assist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2933;
    }

    header {
      padding: 30px 20px 20px;
      background: #123b57;
      color: white;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      font-size: 16px;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .onglet {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 10px;
      background: #e9eef2;
      border-radius: 8px;
      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet:hover {
      background: #d7e3ea;
    }

    main {
      max-width: 1400px;
      min-height: 560px;
      margin: 0 auto;
      padding: 55px 30px 140px;
      background: white;
    }

    .schema {
      display: grid;
      grid-template-columns: 1fr 90px 1.45fr 90px 1fr;
      align-items: center;
      gap: 20px;
    }

    .bloc {
      min-height: 280px;
      padding: 30px;
      background: #f4f7f8;
      border: 2px solid #d9e2e8;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .titre {
      color: #1f2933;
      font-size: 31px;
      line-height: 1.1;
      font-weight: bold;
    }

    .sous-texte {
      margin-top: 14px;
      color: #52606d;
      font-size: 17px;
    }

    .epishuttle {
      background: white;
    }

    .epishuttle img {
      display: block;
      width: 100%;
      max-width: 560px;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    .fleche {
      color: #123b57;
      text-align: center;
      font-size: 68px;
      font-weight: bold;
    }
