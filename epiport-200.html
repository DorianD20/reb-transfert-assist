    body {
      margin: 0;

      background: #f5f7f8;
      color: #1f2933;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .onglet {
      display: flex;
      align-items: center;
      justify-content: center;

      padding: 10px;

      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet:hover {
      background: #d7e3ea;
    }

      min-height: 650px;

      padding: 40px 25px 140px;

    }

    .contenu {
      max-width: 900px;
      margin: 0 auto;
    }

    .bloc {
      margin-bottom: 22px;
      padding: 22px;
      background: #f4f7f8;

      border-radius: 14px;
    }

    .bloc h2 {
      margin: 0 0 12px;
      color: #123b57;
      font-size: 23px;
    }

    .bloc p {
      margin: 0;
      line-height: 1.6;
    }

      bottom: 28px;
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 14px;
    }
