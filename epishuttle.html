<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EpiShuttle - REB Transfert Assist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2933;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .onglet {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 10px;
      background: #e9eef2;
      border-radius: 8px;
      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet:hover {
      background: #d7e3ea;
    }

    .onglet.actif {
      background: #123b57;
      color: white;
    }

    main {
      max-width: 1200px;
      min-height: 650px;
      margin: 0 auto;
      padding: 40px 25px 140px;
      background: white;
    }

    h1 {
      margin: 0 0 10px;
      color: #123b57;
      font-size: 34px;
      text-align: center;
    }

    .introduction {
      margin: 0 0 35px;
      color: #52606d;
      text-align: center;
      font-size: 17px;
    }

    .zone-interactive {
      position: relative;
      width: 100%;
      max-width: 950px;
      margin: 0 auto;
    }

    .zone-interactive img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .pastille {
      position: absolute;
      width: 22px;
      height: 22px;
      padding: 0;
      border: 3px solid white;
      border-radius: 50%;
      background: #e53935;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 20;
    }

    .pastille:hover,
    .pastille:focus {
      transform: translate(-50%, -50%) scale(1.15);
      outline: none;
    }

    .bulle {
      position: absolute;
      display: none;
      min-width: 150px;
      max-width: 230px;
      padding: 12px 14px;
      background: white;
      border: 2px solid #123b57;
      border-radius: 10px;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.22);
      transform: translate(-50%, calc(-100% - 18px));
      text-align: center;
      z-index: 30;
    }

    .bulle.ouverte {
      display: block;
    }

    .bulle a {
      color: #123b57;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }

    .bulle a:hover {
      text-decoration: underline;
    }

    .mention-legale {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 25px 30px;
      color: #6b7280;
      text-align: center;
      font-size: 11px;
      line-height: 1.4;
    }

    .boutons-navigation {
      position: fixed;
      left: 28px;
      bottom: 28px;
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bouton-rond {
      width: 82px;
      height: 82px;
      padding: 0;
      border: 3px solid #164d87;
      border-radius: 50%;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      background:
        linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.55) 0%,
          rgba(255, 255, 255, 0.08) 38%,
          transparent 39%
        ),
        linear-gradient(145deg, #2389dc, #07559c);

      box-shadow:
        0 5px 12px rgba(0, 0, 0, 0.25),
        inset 0 1px 3px rgba(255, 255, 255, 0.65);

      color: white;
      text-decoration: none;
      cursor: pointer;

      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }
