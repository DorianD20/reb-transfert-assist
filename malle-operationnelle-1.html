<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Malle Opérationnelle N°1 - REB Transfert Assist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2933;
    }

    .nav-principale,
    .nav-malles {
      display: grid;
      gap: 10px;
      padding: 15px 20px;
      background: white;
    }

    .nav-principale {
      grid-template-columns: repeat(6, 1fr);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-malles {
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid #d9e2e8;
      border-bottom: 1px solid #d9e2e8;
    }

    .onglet,
    .sous-onglet {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 10px;
      border-radius: 8px;
      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet {
      background: #e9eef2;
    }

    .sous-onglet {
      background: #f1f4f6;
    }

    .onglet:hover,
    .sous-onglet:hover {
      background: #d7e3ea;
    }

    .onglet.actif,
    .sous-onglet.actif {
      background: #123b57;
      color: white;
    }

    main {
      max-width: 1200px;
      min-height: 650px;
      margin: 0 auto;
      padding: 40px 25px 140px;
      background: white;
    }

    h1 {
      margin: 0 0 30px;
      color: #123b57;
      text-align: center;
      font-size: 34px;
    }

    .contenu {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      background: #f4f7f8;
      border: 1px solid #d9e2e8;
      border-radius: 14px;
    }

    h2 {
      margin-top: 0;
      color: #123b57;
    }

    li {
      margin-bottom: 10px;
    }
