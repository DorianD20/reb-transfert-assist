<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Guide Déshabillage Tychem 2000C - REB Transfert Assist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2933;
    }

    .nav-principale,
    .nav-tychem {
      display: grid;
      gap: 10px;
      padding: 15px 20px;
      background: white;
    }

    .nav-principale {
      grid-template-columns: repeat(6, 1fr);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-tychem {
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid #d9e2e8;
      border-bottom: 1px solid #d9e2e8;
    }

    .onglet,
    .sous-onglet {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 10px;
      border-radius: 8px;
      color: #123b57;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .onglet {
      background: #e9eef2;
    }

    .sous-onglet {
      background: #f1f4f6;
    }

    .onglet:hover,
    .sous-onglet:hover {
      background: #d7e3ea;
    }

    .onglet.actif,
    .sous-onglet.actif {
      background: #123b57;
      color: white;
    }

    main {
      max-width: 1200px;
      min-height: 650px;
      margin: 0 auto;
      padding: 40px 25px 140px;
      background: white;
    }

    h1 {
      margin: 0 0 35px;
      color: #123b57;
      text-align: center;
      font-size: 34px;
    }

    /* Encart d'avertissement */
    .alerte-deshabillage {
      max-width: 950px;
      margin: 0 auto 40px;
      background: #fff4e5;
      border-left: 6px solid #f59e0b;
      padding: 20px 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .alerte-deshabillage p {
      margin: 0 0 10px;
      color: #b45309;
      font-size: 17px;
      line-height: 1.5;
    }

    .alerte-deshabillage p:last-child {
      margin-bottom: 0;
    }

    .alerte-deshabillage strong {
      color: #92400e;
    }
